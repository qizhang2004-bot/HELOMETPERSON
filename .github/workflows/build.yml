name: Build Windows Executables (CPU + CUDA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-cpu:
    name: Build CPU Version
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ultralytics opencv-python --no-cache-dir
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          
      - name: Build CPU executable
        run: |
          pyinstaller --onefile --name helmet_detector_cpu --add-data "exp.pt;." helmet.py --noconfirm --collect-all ultralytics
          
      - name: Upload CPU artifact
        uses: actions/upload-artifact@v4
        with:
          name: helmet_detector_cpu
          path: dist/helmet_detector_cpu.exe

  build-cuda:
    name: Build CUDA Version
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies (CUDA)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ultralytics opencv-python --no-cache-dir
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cu121
          
      - name: Find and copy CUDA DLLs
        run: |
          python -c "import os, shutil, glob; import torch; tp = os.path.dirname(torch.__file__); os.makedirs('cuda_dlls', exist_ok=True); copied = 0; lp = os.path.join(tp, 'lib'); [shutil.copy(d, 'cuda_dlls') or print('Copied: ' + d) or (copied := copied + 1) for d in glob.glob(os.path.join(lp, '*.dll'))] if os.path.exists(lp) else None; [shutil.copy(os.path.join(r, f), 'cuda_dlls') or (copied := copied + 1) or print('Copied: ' + os.path.join(r, f)) for r, ds, fs in os.walk(tp) for f in fs if f.endswith('.dll') and any(x in f.lower() for x in ['nvrtc', 'nvtx', 'cublas', 'cudart', 'cudnn', 'nvptx']) and not os.path.exists(os.path.join('cuda_dlls', f))]; print('Total DLLs: ' + str(copied))"
          dir cuda_dlls
          
      - name: Build CUDA executable
        run: |
          python -c "import os; dlls = [f for f in os.listdir('cuda_dlls') if f.endswith('.dll')] if os.path.isdir('cuda_dlls') else []; print('DLL count:', len(dlls))"
          pyinstaller --onefile --name helmet_detector_cuda --add-data "exp.pt;." --collect-all torch --hidden-import torch.cuda --hidden-import torch.backends.cudnn --hidden-import torch.backends.cuda --hidden-import torch._C helmet.py --noconfirm
          
      - name: Check exe size
        run: |
          if (Test-Path dist/helmet_detector_cuda.exe) {
            $size = (Get-Item dist/helmet_detector_cuda.exe).Length / 1MB
            Write-Host "EXE size: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "EXE not found!"
          }
          
      - name: Upload CUDA artifact
        uses: actions/upload-artifact@v4
        with:
          name: helmet_detector_cuda
          path: dist/helmet_detector_cuda.exe
