name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ultralytics opencv-python-headless torch torchvision --only-binary :all:
          
      - name: Build executable
        run: |
          pyinstaller --onefile --name helmet_detector --add-data "exp.torchscript;." helmet.py --noconfirm
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: helmet_detector
          path: dist/helmet_detector.exe
          
      - name: Download in PR
        if: github.event_name == 'pull_request'
        run: |
          echo "Download the artifact from the Actions tab above"