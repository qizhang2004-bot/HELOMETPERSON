name: Build Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============ Windows CPU版 ============
  build-cpu:
    name: Windows CPU
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (CPU)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller ultralytics opencv-python

      - name: Build EXE
        run: pyinstaller --onefile --name helmet_cpu --add-data "exp.pt;." helmet.py --noconfirm --collect-all ultralytics

      - name: Upload
        uses: actions/upload-artifact@v5
        with:
          name: helmet_cpu_windows
          path: dist/helmet_cpu.exe

  # ============ Windows CUDA版 ============
  build-cuda:
    name: Windows CUDA
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (CUDA)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cu121
          pip install pyinstaller ultralytics opencv-python

      - name: Build EXE
        run: pyinstaller --onefile --name helmet_cuda --add-data "exp.pt;." helmet.py --noconfirm --collect-all torch --collect-all ultralytics --hidden-import torch.cuda --hidden-import torch.backends.cudnn

      - name: Upload
        uses: actions/upload-artifact@v5
        with:
          name: helmet_cuda_windows
          path: dist/helmet_cuda.exe

  # ============ Mac MPS版 ============
  build-mps:
    name: Mac MPS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install torch torchvision
          pip install pyinstaller ultralytics opencv-python

      - name: Build executable
        run: pyinstaller --onefile --name helmet_mps --add-data "exp.pt:." helmet.py --noconfirm --collect-all ultralytics

      - name: Upload
        uses: actions/upload-artifact@v5
        with:
          name: helmet_mps_macos
          path: dist/helmet_mps
