name: Build Windows Executables (CPU + CUDA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-cpu:
    name: Build CPU Version
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ultralytics opencv-python --no-cache-dir
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          
      - name: Build CPU executable
        run: |
          pyinstaller --onefile --name helmet_detector_cpu --add-data "exp.pt;." helmet.py --noconfirm --collect-all ultralytics
          
      - name: Upload CPU artifact
        uses: actions/upload-artifact@v4
        with:
          name: helmet_detector_cpu
          path: dist/helmet_detector_cpu.exe

  build-cuda:
    name: Build CUDA Version
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies (CUDA)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ultralytics opencv-python --no-cache-dir
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cu121
          
      - name: Download CUDA Runtime DLLs
        run: |
          # 方案：从 GitHub quixbf/dlls 下载 CUDA 12.1 便携版 DLL
          # 这是第三方收集的 CUDA DLL 包，方便打包
          $urls = @(
            "https://github.com/quixbf/dlls/releases/download/12.1.0/cuda_dlls.zip",
            "https://github.com/nicknisi/dlls/releases/download/v0.0.1/cuda-12.1.0.zip"
          )
          
          $downloaded = $false
          foreach ($url in $urls) {
            Write-Host "Trying: $url"
            try {
              Invoke-WebRequest -Uri $url -OutFile cuda_dlls.zip -TimeoutSec 60 -ErrorAction Stop
              $downloaded = $true
              Write-Host "Download succeeded: $url"
              break
            } catch {
              Write-Host "Failed: $($_.Exception.Message)"
            }
          }
          
          if (-not $downloaded) {
            Write-Host "All URLs failed, using torch package DLLs instead..."
            # 回退：从 torch 包里提取所有 DLL
            python -c "
import os, shutil
import torch
tp = os.path.dirname(torch.__file__)
print(f'Torch path: {tp}')
os.makedirs('cuda_dlls', exist_ok=True)
copied = 0
for root, dirs, files in os.walk(tp):
    for f in files:
        if f.endswith('.dll'):
            src = os.path.join(root, f)
            dst = os.path.join('cuda_dlls', f)
            if not os.path.exists(dst):
                shutil.copy2(src, dst)
                copied += 1
print(f'Copied {copied} DLLs from torch')
"
          } else {
            # 解压
            Write-Host "Extracting..."
            Expand-Archive -Path cuda_dlls.zip -DestinationPath cuda_dlls -Force
            Get-ChildItem -Path cuda_dlls -File -Recurse -Include *.dll | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}} | Sort-Object 'Size(MB)' -Descending | Select-Object -First 20
          }
          
      - name: Build CUDA executable
        run: |
          $dlls = Get-ChildItem cuda_dlls -File -Recurse -Include *.dll -ErrorAction SilentlyContinue
          Write-Host "Found $($dlls.Count) CUDA DLLs"
          
          pyinstaller --onefile --name helmet_detector_cuda `
            --add-data "exp.pt;." `
            --collect-all torch `
            --hidden-import torch.cuda `
            --hidden-import torch.backends.cudnn `
            --hidden-import torch.backends.cuda `
            --hidden-import torch._C `
            helmet.py --noconfirm
          
      - name: Check exe size
        run: |
          if (Test-Path dist/helmet_detector_cuda.exe) {
            $size = (Get-Item dist/helmet_detector_cuda.exe).Length / 1MB
            Write-Host "EXE size: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "EXE not found!"
          }
          
      - name: Upload CUDA artifact
        uses: actions/upload-artifact@v4
        with:
          name: helmet_detector_cuda
          path: dist/helmet_detector_cuda.exe
