name: Build Windows Executables (CPU + CUDA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-cpu:
    name: Build CPU Version
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ultralytics opencv-python --no-cache-dir
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          
      - name: Build CPU executable
        run: |
          pyinstaller --onefile --name helmet_detector_cpu --add-data "exp.pt;." helmet.py --noconfirm --collect-all ultralytics
          
      - name: Upload CPU artifact
        uses: actions/upload-artifact@v4
        with:
          name: helmet_detector_cpu
          path: dist/helmet_detector_cpu.exe

  build-cuda:
    name: Build CUDA Version
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies (CUDA)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ultralytics opencv-python --no-cache-dir
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cu121
          
      - name: Download CUDA Runtime DLLs
        run: |
          # 下载 NVIDIA CUDA Runtime Redistributable
          # 这是独立于 CUDA Toolkit 的运行时库，可以自由分发
          $cudaUrl = "https://github.com/nicknisi/dlls/releases/download/v0.0.3/cuda-12.1.0.zip"
          Write-Host "Downloading CUDA Runtime from: $cudaUrl"
          Invoke-WebRequest -Uri $cudaUrl -OutFile cuda_runtime.zip -TimeoutSec 300
          
          # 解压
          Write-Host "Extracting CUDA Runtime..."
          Expand-Archive -Path cuda_runtime.zip -DestinationPath cuda_runtime -Force
          
          # 列出解压的文件
          Get-ChildItem -Path cuda_runtime -Recurse -Include *.dll | Select-Object -First 20 FullName, Length
          
      - name: Build CUDA executable
        run: |
          # 找到 CUDA DLL 目录
          $cudaDllDir = Get-ChildItem -Path cuda_runtime -Directory | Select-Object -First 1
          if ($cudaDllDir) {
            Write-Host "CUDA DLL directory: $($cudaDllDir.FullName)"
            
            # 打包命令：包含 CUDA Runtime DLL
            pyinstaller --onefile --name helmet_detector_cuda `
              --add-data "exp.pt;." `
              --add-data "$($cudaDllDir.FullName);." `
              --collect-all torch `
              --hidden-import torch.cuda `
              --hidden-import torch.backends.cudnn `
              --hidden-import torch.backends.cuda `
              --hidden-import torch._C `
              helmet.py --noconfirm
          } else {
            Write-Host "No CUDA DLL directory found, building without CUDA DLLs..."
            pyinstaller --onefile --name helmet_detector_cuda `
              --add-data "exp.pt;." `
              --collect-all torch `
              --hidden-import torch.cuda `
              --hidden-import torch.backends.cudnn `
              --hidden-import torch.backends.cuda `
              --hidden-import torch._C `
              helmet.py --noconfirm
          }
          
      - name: Check exe size
        run: |
          if (Test-Path dist/helmet_detector_cuda.exe) {
            $size = (Get-Item dist/helmet_detector_cuda.exe).Length / 1MB
            Write-Host "EXE size: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "EXE not found!"
            Get-ChildItem dist
          }
          
      - name: Upload CUDA artifact
        uses: actions/upload-artifact@v4
        with:
          name: helmet_detector_cuda
          path: dist/helmet_detector_cuda.exe
